<div id="pagefind-search-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;overflow-y:auto;">
  <div style="max-width:740px;margin:60px auto;padding:24px;background-color:#ffffff;border-radius:8px;box-shadow:0 10px 25px rgba(0,0,0,0.2);">
    <div id="pagefind-modal-search"></div>
  </div>
</div>

<script src="/pagefind/pagefind-ui.js"></script>
<script>
window.addEventListener('DOMContentLoaded', function() {
  var overlay = document.getElementById('pagefind-search-overlay');

  window.togglePagefindSearch = function() {
    if (typeof PagefindUI === 'undefined') {
      console.warn("Pagefind search is not available locally. Run 'npx pagefind --site public' to build the index.");
      return;
    }
    if (overlay.style.display === 'none') {
      overlay.style.display = 'block';
      setTimeout(function() {
        var input = overlay.querySelector('.pagefind-ui__search-input');
        if (input) input.focus();
      }, 50);
    } else {
      overlay.style.display = 'none';
    }
  };

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.style.display = 'none';
  });

  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      window.togglePagefindSearch();
    }
    if (e.key === 'Escape' && overlay.style.display !== 'none') {
      overlay.style.display = 'none';
    }
  });

  if (typeof PagefindUI === 'undefined') return;

  if (document.getElementById("pagefind-sidebar-search")) {
    try {
      new PagefindUI({ element: "#pagefind-sidebar-search", showImages: false, resetStyles: false });
    } catch (e) {
      console.error("Failed to initialize sidebar search", e);
    }
  }

  if (document.getElementById("pagefind-modal-search")) {
    try {
      new PagefindUI({ element: "#pagefind-modal-search", showImages: false });
    } catch (e) {
      console.error("Failed to initialize modal search", e);
    }
  }
});
</script>

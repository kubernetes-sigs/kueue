<div class="row g-4 mt-2">
  {{ range site.Data.community_content }}
  <div class="col-md-4">

    <div class="card h-100 community-card shadow-sm bg-white rounded-3">
      <div class="card-body d-flex flex-column p-3">
        <div class="d-flex align-items-center mb-2.5">
          <div class="bg-light text-info rounded-circle d-flex align-items-center justify-content-center me-2.5" style="width: 32px; height: 32px;">
            <i class="{{ .icon }} fa-sm"></i>
          </div>
          <div>
            <span class="badge bg-light text-muted border fw-semibold" style="font-size: 0.75rem; padding: 0.25em 0.5em;">{{ .platform }}</span>
          </div>
        </div>
        <h6 class="card-title fw-bold mb-1.5">
          <a href="{{ .url }}" target="_blank" rel="noopener" class="text-dark text-decoration-none hover-teal">
            {{ .title }}
          </a>
        </h6>
        <p class="card-text text-muted small mb-3 flex-grow-1" style="font-size: 0.825rem; line-height: 1.4;">
          {{ .description }}
        </p>
        <div class="d-flex align-items-center justify-content-between mt-auto pt-2.5 border-top text-muted" style="font-size: 0.75rem;">
          <div>
            <i class="fas fa-user me-1"></i> {{ .author }}
          </div>
          <div>
            <i class="fas fa-calendar-alt me-1"></i> {{ .date }}
          </div>
        </div>
      </div>
    </div>
  </div>
  {{ end }}
</div>

# Hero Section
- id: homepage_hero_tagline
  translation: "Kubernetes 原生作业队列系统"
- id: homepage_hero_description
  translation: "管理批处理、HPC 和 AI/ML 工作负载的配额和资源共享。Kueue 决定作业应在何时何地运行，并与您现有的生态系统无缝集成。"
- id: homepage_btn_install
  translation: "安装 Kueue"
- id: homepage_btn_quick_start
  translation: "快速入门"
- id: homepage_btn_join_slack
  translation: "加入 Slack"

# Core Capabilities Section
- id: homepage_capabilities_title
  translation: "核心功能"
- id: homepage_capabilities_subtitle
  translation: "Kueue 基于以下五个核心架构支柱，原生管理标准 API（包括 **Job、JobSet、KubeRay、Kubeflow Trainer 和 LeaderWorkerSet**）的资源准入："

# Capabilities Cards
- id: homepage_cap_multitenant_title
  translation: "多租户配额"
- id: homepage_cap_multitenant_desc
  translation: "在集群级别全局定义资源配额，并在不同团队和命名空间之间安全共享。使用原生 Kubernetes API 管理资源分配、队列优先级和限制。"

- id: homepage_cap_sharing_title
  translation: "动态容量共享"
- id: homepage_cap_sharing_desc
  translation: "将队列组合在一起以实现动态资源共享。当团队的资源池空闲时，工作负载可以自动从同伴团队借用未使用的容量，从而最大化 GPU/CPU 整体利用率并降低成本。"

- id: homepage_cap_topology_title
  translation: "拓扑感知部署"
- id: homepage_cap_topology_desc
  translation: "根据物理网络拓扑优化大型分布式机器学习训练工作负载（如 LLM）的部署。通过将紧密耦合的 Pod 编组在相同的基础设施上，来最小化网络延迟。"

- id: homepage_cap_preemption_title
  translation: "资源池与抢占"
- id: homepage_cap_preemption_desc
  translation: "支持多样化的硬件池，例如 Spot 与按需实例或不同的 GPU 型号。工作负载会自动路由到合适的资源池，并通过基于优先级的抢占确保高优先级作业优先运行。"

- id: homepage_cap_multicluster_title
  translation: "多集群扩展"
- id: homepage_cap_multicluster_desc
  translation: "无缝地将工作负载扩展到单个集群之外。中央控制平面根据全局资源可用性自动将作业调度到多个工作集群，从而实现混合云和多云调度。"

# Architecture Section
- id: homepage_architecture_title
  translation: "架构与集成"
- id: homepage_architecture_desc
  translation: "Kueue 在调度器*之前*充当准入控制器，在不替换核心 Kubernetes 组件的情况下干净地管理队列和配额。"
- id: homepage_architecture_alt
  translation: "Kueue 架构与集成流程"


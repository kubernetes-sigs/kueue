# Hero Section
- id: homepage_hero_tagline
  translation: "Kubernetes-native Job Queueing"
- id: homepage_hero_description
  translation: "Manage quotas and resource sharing for batch, HPC, and AI/ML workloads. Kueue decides when and where jobs should run, integrating seamlessly with your existing ecosystem."
- id: homepage_btn_install
  translation: "Install Kueue"
- id: homepage_btn_quick_start
  translation: "Quick Start"
- id: homepage_btn_join_slack
  translation: "Join Slack"

# Core Capabilities Section
- id: homepage_capabilities_title
  translation: "Core Capabilities"
- id: homepage_capabilities_subtitle
  translation: "Kueue governs resource admission natively for standard APIs (including **Job, JobSet, KubeRay, Kubeflow Trainer, and LeaderWorkerSet**) using these five core architectural pillars:"

# Capabilities Cards
- id: homepage_cap_multitenant_title
  translation: "Multi-Tenant Quotas"
- id: homepage_cap_multitenant_desc
  translation: "Define resource quotas globally at the cluster level and share them securely across different teams and namespaces. Govern resource allocations, queue priorities, and limits using native Kubernetes APIs."

- id: homepage_cap_sharing_title
  translation: "Dynamic Capacity Sharing"
- id: homepage_cap_sharing_desc
  translation: "Group queues together to enable dynamic resource sharing. Workloads can automatically borrow unused capacity from peer teams when their resource pools are idle, maximizing overall GPU/CPU utilization and slashing costs."

- id: homepage_cap_topology_title
  translation: "Topology-Aware Placement"
- id: homepage_cap_topology_desc
  translation: "Optimize the placement of large, distributed machine learning training workloads (like LLMs) based on physical network topology. Minimize network latency by grouping tightly-coupled pods on the same infrastructure."

- id: homepage_cap_preemption_title
  translation: "Resource Pools & Preemption"
- id: homepage_cap_preemption_desc
  translation: "Support diverse hardware pools, such as Spot vs. On-Demand instances or different GPU models. Workloads are automatically routed to the appropriate resource pool, with priority-based preemption ensuring higher-priority jobs run first."

- id: homepage_cap_multicluster_title
  translation: "Multi-Cluster Scaling"
- id: homepage_cap_multicluster_desc
  translation: "Scale workloads seamlessly beyond a single cluster. A central control plane automatically dispatches jobs to multiple worker clusters based on global resource availability, enabling hybrid and multi-cloud scheduling."

# Architecture Section
- id: homepage_architecture_title
  translation: "Architecture & Integration"
- id: homepage_architecture_desc
  translation: "Kueue acts as an admission controller *before* the scheduler, managing queues and quotas cleanly without replacing core Kubernetes components."
- id: homepage_architecture_alt
  translation: "Kueue Architecture & Integration Flow"


# A pod group WITHOUT the WAS annotation.
# Kueue manages the workload but does NOT create a native PodGroup
# and does NOT default schedulingGroup.podGroupName.
apiVersion: v1
kind: Pod
metadata:
  name: no-was-sample-0
  labels:
    kueue.x-k8s.io/queue-name: was-queue
    kueue.x-k8s.io/pod-group-name: no-was-sample
  annotations:
    kueue.x-k8s.io/pod-group-total-count: "2"
spec:
  restartPolicy: Never
  containers:
  - name: worker
    image: registry.k8s.io/e2e-test-images/agnhost:2.52
    args: ["entrypoint-tester"]
    resources:
      requests:
        cpu: "200m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
---

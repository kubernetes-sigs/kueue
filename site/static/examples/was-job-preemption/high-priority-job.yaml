# High-priority Job with WAS Workload + PodGroup (batch/v1 Job equivalent of the JobSet example)
#
# This Job creates 4 pods (parallelism=4, completions=4), each requesting 6 CPUs.
# Total: 24 CPUs. Since the low-priority job already consumes 24 CPUs,
# this high-priority job should trigger workload-level preemption of the low-priority job.
---
apiVersion: scheduling.k8s.io/v1alpha3
kind: Workload
metadata:
  name: hp-job-wl
spec:
  controllerRef:
    apiGroup: batch
    kind: Job
    name: hp-job
  podGroupTemplates:
  - name: workers
    priorityClassName: high-priority
    disruptionMode:
      all: {}
    schedulingPolicy:
      gang:
        minCount: 4
---
apiVersion: scheduling.k8s.io/v1alpha3
kind: PodGroup
metadata:
  name: hp-job-wl-workers
  namespace: default
spec:
  podGroupTemplateRef:
    workload:
      workloadName: hp-job-wl
      podGroupTemplateName: workers
  priorityClassName: high-priority
  disruptionMode:
    all: {}
  schedulingPolicy:
    gang:
      minCount: 4
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hp-job
spec:
  completions: 4
  parallelism: 4
  backoffLimit: 10
  template:
    spec:
      terminationGracePeriodSeconds: 0
      priorityClassName: high-priority
      schedulingGroup:
        podGroupName: hp-job-wl-workers
      containers:
      - name: worker
        image: busybox
        command: ["sleep", "infinity"]
        resources:
          requests:
            cpu: "6"
      restartPolicy: Never

# =====================================================================
# KUEUE TALKS & CASE STUDIES DATA
# =====================================================================
# How to add a new Talk, Case Study, or Tutorial:
# 1. Copy one of the blocks below.
# 2. Paste it at the bottom of this file.
# 3. Fill in the details.
#
# Fields:
#  - title:       Title of the talk or article (Required)
#  - event:       Conference (e.g. "KubeCon EU") or Platform (e.g. "Medium") (Required)
#  - date:        YYYY-MM-DD format. Used for automatic chronological sorting. (Required)
#  - type:        Choose one: "talk" (video), "case-study" (customer story/article), "tutorial" (guide) (Required)
#  - featured:    Set to true to highlight this if we use featured layouts. (Optional)
#  - presenters:  List of speakers or authors. (Optional)
#     - name:     Speaker name (Required if presenters is used)
#       company:  Speaker company (Optional)
#  - description: A 1-2 sentence summary of the content. (Optional, can be added manually by authors)
#  - links:       Add links to available resources (Optional)
#     - details:   URL to the event schedule page (e.g., sched.co)
#     - video:     URL to the YouTube recording
#     - slides:    URL to the PDF slides
#     - article:   URL to a written blog post or case study article
#     - materials: URL to code repos or additional tutorial materials
# =====================================================================


# Scheduler Performance Test Configuration - Large Scale
# Tests scheduler throughput at high CQ count: 20 cohorts × 100 queues = 2000 cluster queues
# Workloads: 30 per queue × 2000 queues = 60,000 total (1 pod each)
# runtimeMs and creationIntervalMs reduced to target <20min CI run.

cohorts:
  - className: cohort
    count: 20
    queuesSets:
    - className: cq
      count: 100
      nominalQuota: 20
      borrowingLimit: 100
      reclaimWithinCohort: Any
      withinClusterQueue: LowerPriority
      workloadsSets:
      - count: 20
        creationIntervalMs: 20
        workloads:
        - className: small
          runtimeMs: 50
          priority: 50
          request: 1
      - count: 7
        creationIntervalMs: 50
        workloads:
        - className: medium
          runtimeMs: 100
          priority: 100
          request: 5
      - count: 3
        creationIntervalMs: 200
        workloads:
        - className: large
          runtimeMs: 200
          priority: 200
          request: 20

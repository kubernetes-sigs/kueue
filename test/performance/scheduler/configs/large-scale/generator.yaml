# Scheduler Performance Test Configuration - Large Scale
# Tests scheduler throughput at high CQ count: 40 cohorts × 10 queues = 400 cluster queues
# Workloads: 50 per queue × 400 queues = 20,000 total (1 pod each)

cohorts:
  - className: cohort
    count: 40
    queuesSets:
    - className: cq
      count: 10
      nominalQuota: 20
      borrowingLimit: 100
      reclaimWithinCohort: Any
      withinClusterQueue: LowerPriority
      workloadsSets:
      - count: 35
        creationIntervalMs: 100
        workloads:
        - className: small
          runtimeMs: 200
          priority: 50
          request: 1
      - count: 10
        creationIntervalMs: 500
        workloads:
        - className: medium
          runtimeMs: 500
          priority: 100
          request: 5
      - count: 5
        creationIntervalMs: 1200
        workloads:
        - className: large
          runtimeMs: 1000
          priority: 200
          request: 20

# TAS Performance Test Configuration
# Topology: 1 block × 1000 racks × 60 nodes = 20,000 nodes total
# Workload patterns: Required, Preferred, and Balanced topology

# Topology configuration
topology:
  name: "default-topology"
  levels:
    - name: block
      count: 1
      nodeLabel: "cloud.provider.com/topology-block"
    - name: rack
      count: 1000
      nodeLabel: "cloud.provider.com/topology-rack"
    - name: node
      count: 20
      nodeLabel: "kubernetes.io/hostname"
      capacity:
        cpu: "96"
        memory: "256Gi"

# Resource flavor configuration
resourceFlavor:
  name: "tas-flavor"
  nodeLabel: "tas-node-group"
  topologyName: "default-topology"

# Workload generation
cohorts:
  - className: cohort
    count: 2
    queuesSets:
      - className: cq
        count: 3
        nominalQuota: "266666"
        borrowingLimit: "533333"
        reclaimWithinCohort: Any
        withinClusterQueue: LowerPriority
        workloadsSets:
          - count: 166
            creationIntervalMs: 20
            workloads:
              - className: small-required-rack
                runtimeMs: 10000
                priority: 50
                request: "2"
                podCount: 4
                tasConstraint: "required"
                tasLevel: "cloud.provider.com/topology-rack"
          - count: 33
            creationIntervalMs: 50
            workloads:
              - className: medium-required-rack
                runtimeMs: 15000
                priority: 100
                request: "4"
                podCount: 8
                tasConstraint: "required"
                tasLevel: "cloud.provider.com/topology-rack"
          - count: 66
            creationIntervalMs: 100
            workloads:
              - className: large-required-rack
                runtimeMs: 20000
                priority: 200
                request: "8"
                podCount: 16
                tasConstraint: "required"
                tasLevel: "cloud.provider.com/topology-rack"
          - count: 33
            creationIntervalMs: 30
            workloads:
              - className: small-preferred-rack
                runtimeMs: 12000
                priority: 100
                request: "2"
                podCount: 4
                tasConstraint: "preferred"
                tasLevel: "cloud.provider.com/topology-rack"
          - count: 66
            creationIntervalMs: 40
            workloads:
              - className: medium-preferred-block
                runtimeMs: 16000
                priority: 150
                request: "4"
                podCount: 8
                tasConstraint: "preferred"
                tasLevel: "cloud.provider.com/topology-block"
          - count: 50
            creationIntervalMs: 60
            workloads:
              - className: medium-balanced-rack
                runtimeMs: 18000
                priority: 200
                request: "4"
                podCount: 16
                tasConstraint: "balanced"
                tasLevel: "cloud.provider.com/topology-rack"
                sliceSize: 4
          - count: 33
            creationIntervalMs: 80
            workloads:
              - className: large-balanced-rack
                runtimeMs: 25000
                priority: 250
                request: "8"
                podCount: 32
                tasConstraint: "balanced"
                tasLevel: "cloud.provider.com/topology-rack"
                sliceSize: 8
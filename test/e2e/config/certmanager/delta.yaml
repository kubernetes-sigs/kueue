# certmanager exercises Kueue's internalCertManagement=false path (a cert-manager
# Certificate/Issuer provides the webhook cert instead) and only the batch/job
# integration is enabled — this suite is scoped to cert delivery, not scheduling
# feature coverage. fairSharing/waitForPodsReady stay disabled by omission: unlike
# v1beta1, v1beta2 has no fairSharing.enable/waitForPodsReady.enable field — a
# feature is enabled by the presence of its config block, not a nested bool.
internalCertManagement:
  enable: false
integrations:
  frameworks:
    - "batch/job"

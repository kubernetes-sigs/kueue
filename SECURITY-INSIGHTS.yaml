header:
  schema-version: 1.0.0
  expiration-date: '2027-07-10T01:00:00.000Z'
  last-updated: '2026-07-14'
  last-reviewed: '2026-07-14'
  commit-hash: "2a3069690648920bed30457eb3231f94d8f30d77"
  project-url: 'https://github.com/kubernetes-sigs/kueue'
  project-release: "0.19.0"
  changelog: 'https://github.com/kubernetes-sigs/kueue/tree/main/CHANGELOG'
  license: 'https://github.com/kubernetes-sigs/kueue/blob/main/LICENSE'
project-lifecycle:
  status: active
  roadmap: >-
    https://github.com/kubernetes-sigs/kueue/blob/9464e42a54d67f785e2e19b8c8bbd4471cd283ad/README.md?plain=1#L98
  bug-fixes-only: false
  core-maintainers:
    - https://github.com/kubernetes-sigs/kueue/blob/main/OWNERS
  release-cycle: 'https://github.com/kubernetes-sigs/kueue/blob/main/RELEASE.md'
  release-process: >-
    https://github.com/kubernetes-sigs/kueue/blob/main/.github/ISSUE_TEMPLATE/NEW_RELEASE.md
contribution-policy:
  accepts-pull-requests: true
  accepts-automated-pull-requests: true
  contributing-policy: 'https://github.com/kubernetes-sigs/kueue/blob/main/CONTRIBUTING.md'
  code-of-conduct: >-
    https://github.com/kubernetes-sigs/kueue/blob/9464e42a54d67f785e2e19b8c8bbd4471cd283ad/code-of-conduct.md
documentation:
  - 'https://kueue.sigs.k8s.io/docs/'
distribution-points:
  - >-
    https://github.com/kubernetes-sigs/kueue/releases/download/v0.19.0/manifests.yaml
security-artifacts:
  threat-model:
    threat-model-created: false
  self-assessment:
    self-assessment-created: false
security-testing:
  - tool-type: sca
    tool-name: Dependabot
    tool-version: '2'
    tool-url: 'https://github.com/dependabot'
    integration:
      ad-hoc: false
      ci: true
      before-release: true
    comment: dependabot interval set to "weekly"
security-contacts:
  - type: email
    value: kueue-alerts@kubernetes.io
    primary: true
  - type: email
    value: security-discuss-private@kubernetes.io
    primary: false
vulnerability-reporting:
  accepts-vulnerability-reports: true
  email-contact: security@kubernetes.io
  Security-policy: 'https://kubernetes.io/security/'
  bug-bounty-available: true
  bug-bounty-url: 'https://hackerone.com/kubernetes'
  in-scope:
    - Privilege escalation or RBAC bypass allowing viewing or editing of restricted information managed by Kueue (for example, viewing restricted information via KueueViz)
    - Workload quota bypass at admission time or post-admission (for example, admitting a workload within quota and later increasing its resource usage beyond what was admitted)
    - Quota hijacking, or otherwise consuming resources that were not granted, without admin access, even when other tenants' quotas and workloads are not affected
    - Tenant isolation breakout across ClusterQueues, LocalQueues, and Cohorts (for example, quota borrowing or preemption affecting workloads of another tenant)
    - Insecure RBAC defaults in the shipped manifests or Helm chart
  out-scope:
    - Vulnerabilities in Kubernetes core, which are delegated to the upstream Kubernetes security process at https://kubernetes.io/security/
    - Issues that only affect unsupported Kueue releases
    - Insecure configuration in a consuming cluster
    - Reports that require pre-existing privileged (cluster-admin) access
dependencies:
  third-party-packages: true
  dependencies-lists:
    - 'https://github.com/kubernetes-sigs/kueue/blob/main/go.mod'
  sbom:
    - sbom-file: https://github.com/kubernetes-sigs/kueue/releases/download/v0.19.0/kueue-v0.19.0.spdx.json
      sbom-format: SPDX
  dependencies-lifecycle:
    policy-url: 'https://github.com/kubernetes-sigs/kueue/blob/main/DEPENDENCY_LIFECYCLE.md'
    comment: |
      New dependencies are introduced via standard pull requests reviewed by
      maintainers listed in OWNERS. Existing dependencies are kept current by
      Dependabot — weekly for Go modules, Docker images, and npm packages, and
      daily for GitHub Actions. k8s.io/* modules accept only patch and security
      updates automatically; major and minor bumps are coordinated with a Kueue
      release that targets a new Kubernetes minor. See DEPENDENCY_LIFECYCLE.md
      for the full policy.

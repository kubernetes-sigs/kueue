kueuePriorityBooster:
  image:
    repository: us-central1-docker.pkg.dev/k8s-staging-images/kueue/kueue-priority-booster
    tag: release-0.19
    pullPolicy: Always
  imagePullSecrets: []
  config:
    # timeSharing groups the parameters of the time-sharing mode.
    #   interval is how long a workload stays admitted with no annotation;
    #     after this, a negative kueue.x-k8s.io/priority-boost is applied while still admitted.
    #     Requires ClusterQueue withinClusterQueue: LowerPriority. Set to "0" to disable.
    #   negativeBoost is the magnitude of the negative boost after the interval (see README).
    timeSharing:
      interval: "30m"
      negativeBoost: 100000
      # Optional: limit to workloads matching this label selector (omit = all workloads).
      # workloadSelector:
      #   matchLabels:
      #     tier: batch
      # Optional: exclude workloads with Spec.Priority greater than this (nil priority = 0).
      # maxWorkloadPriority: 1000
kueue:
  enabled: false

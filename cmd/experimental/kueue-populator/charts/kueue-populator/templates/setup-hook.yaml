# 1. ConfigMap containing Kueue resource definitions.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-kueue-resources
  namespace: {{ .Release.Namespace }}
data:
  resources.yaml: |-
{{- if .Values.kueuePopulator.config.topology }}
{{- if .Values.kueuePopulator.config.topology.levels }}
    apiVersion: kueue.x-k8s.io/v1beta2
    kind: Topology
    metadata:
      name: "default"
    spec:
      levels:
{{- range .Values.kueuePopulator.config.topology.levels }}
        - nodeLabel: {{ .nodeLabel | quote }}
{{- end }}
    ---
{{- end }}
{{- end }}
{{- if .Values.kueuePopulator.config.resourceFlavor }}
    kind: ResourceFlavor
    apiVersion: kueue.x-k8s.io/v1beta2
    metadata:
      name: "tas-gpu-default"
    spec:
      {{- with .Values.kueuePopulator.config.resourceFlavor.nodeLabels }}
      nodeLabels:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.kueuePopulator.config.topology }}
      {{- if .Values.kueuePopulator.config.topology.levels }}
      topologyName: "default"
      {{- end }}
      {{- end }}
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: NoSchedule
    ---
{{- end }}
{{- if .Values.kueuePopulator.config.clusterQueue }}
    apiVersion: kueue.x-k8s.io/v1beta2
    kind: ClusterQueue
    metadata:
      name: {{ .Values.kueuePopulator.config.clusterQueue.name | quote }}
    spec:
      namespaceSelector: {} # match all.
      resourceGroups:
      - coveredResources:
{{- range .Values.kueuePopulator.config.clusterQueue.resources }}
        - {{ .name | quote }}
{{- end }}
        flavors:
        - name: "tas-gpu-default"
          resources:
{{- range .Values.kueuePopulator.config.clusterQueue.resources }}
          - name: {{ .name | quote }}
            nominalQuota: {{ .nominalQuota }}
{{- end }}
{{- end }}
---
# 2. Service Account shared by the create (post-install) and delete (pre-delete) Jobs.
# Regular release resource: present for both hooks and removed by Helm on uninstall.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-kueue-hook-sa
  namespace: {{ .Release.Namespace }}
---
# 3. ClusterRole with permissions to create AND delete the Kueue resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-kueue-hook-clusterrole
rules:
- apiGroups: ["kueue.x-k8s.io"]
  resources: ["topologies", "resourceflavors", "clusterqueues", "localqueues"]
  verbs: ["create", "get", "list", "patch", "update", "delete"]
- apiGroups: [""] # Core API group
  resources: ["configmaps", "endpoints"]
  verbs: ["get"]
---
# 4. A ClusterRoleBinding to grant the permissions cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-kueue-hook-crb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-kueue-hook-clusterrole
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-kueue-hook-sa
  namespace: {{ .Release.Namespace }}
---
# 5. The Job that applies the resources after install/upgrade.
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-create-kueue-resources-job"
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-kueue-hook-sa
      containers:
      - name: kubectl-apply
        image: {{ include "kueue-populator.kubectlImage" . }}
        command:
        - kubectl
        - apply
        - -f
        - /etc/config/resources.yaml
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config
      restartPolicy: Never
      volumes:
      - name: config-volume
        configMap:
          name: {{ .Release.Name }}-kueue-resources
  backoffLimit: 5
---
# 6. The Job that deletes the resources before the release is removed, so the
# cluster-scoped Kueue objects created by the create Job above do not leak on
# `helm uninstall`. It reuses the ConfigMap and ServiceAccount, which are still
# present at pre-delete time.
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-delete-kueue-resources-job"
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-kueue-hook-sa
      containers:
      - name: kubectl-delete
        image: {{ include "kueue-populator.kubectlImage" . }}
        command:
        - kubectl
        - delete
        - -f
        - /etc/config/resources.yaml
        - --ignore-not-found=true
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config
      restartPolicy: Never
      volumes:
      - name: config-volume
        configMap:
          name: {{ .Release.Name }}-kueue-resources
  backoffLimit: 5

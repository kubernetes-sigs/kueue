{{- $kueueConfig := dict -}}
{{- with .Values.kueue }}
{{- with .managerConfig }}
{{- with .controllerManagerConfigYaml }}
{{- $kueueConfig = . | fromYaml -}}
{{- end }}
{{- end }}
{{- end }}
{{- $kueueNamespace := .Release.Namespace -}}
{{- with $kueueConfig.namespace }}
{{- $kueueNamespace = . -}}
{{- end }}
{{- $managedJobsNamespaceSelector := dict "matchExpressions" (list (dict "key" "kubernetes.io/metadata.name" "operator" "NotIn" "values" (list "kube-system" $kueueNamespace))) -}}
{{- if and (hasKey $kueueConfig "managedJobsNamespaceSelector") (ne $kueueConfig.managedJobsNamespaceSelector nil) }}
{{- $managedJobsNamespaceSelector = $kueueConfig.managedJobsNamespaceSelector -}}
{{- end }}
{{- with .Values.kueuePopulator.config }}
{{- if and (hasKey . "managedJobsNamespaceSelector") (ne .managedJobsNamespaceSelector nil) }}
{{- $managedJobsNamespaceSelector = .managedJobsNamespaceSelector -}}
{{- end }}
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-kueue-populator
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-kueue-populator-role
rules:
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kueue.x-k8s.io
  resources:
  - clusterqueues
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kueue.x-k8s.io
  resources:
  - localqueues
  verbs:
  - create
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-kueue-populator-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-kueue-populator-role
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-kueue-populator
  namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-kueue-populator-config
  namespace: {{ .Release.Namespace }}
data:
  controller_manager_config.yaml: |
    {{- if eq (default "Static" .Values.kueuePopulator.config.localQueue.nameMode) "AsClusterQueue" }}
    localQueueNameMode: AsClusterQueue
    {{- else }}
    localQueueName: {{ .Values.kueuePopulator.config.localQueue.name }}
    {{- end }}
    managedJobsNamespaceSelector:
{{ $managedJobsNamespaceSelector | toYaml | indent 6 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-kueue-populator
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kueue-populator
    app.kubernetes.io/instance: {{ .Release.Name }}
    control-plane: kueue-populator
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: kueue-populator
      app.kubernetes.io/name: kueue-populator
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        control-plane: kueue-populator
        app.kubernetes.io/name: kueue-populator
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-kueue-populator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - args:
        - "--config=/etc/kueue/controller_manager_config.yaml"
        - "--zap-log-level=2"
        image: "{{ .Values.kueuePopulator.image.repository }}:{{ .Values.kueuePopulator.image.tag }}"
        imagePullPolicy: {{ .Values.kueuePopulator.image.pullPolicy }}
        name: manager
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 100m
            memory: 100Mi
          requests:
            cpu: 100m
            memory: 100Mi
        volumeMounts:
        - mountPath: /etc/kueue
          name: manager-config
      {{- with .Values.kueuePopulator.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10
      volumes:
      - configMap:
          name: {{ .Release.Name }}-kueue-populator-config
        name: manager-config
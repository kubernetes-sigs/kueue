suite: test kueue-populator deployment
templates:
  - manager.yaml

tests:
  - it: should have default replicas
    documentIndex: 4
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should set image and tag from values
    documentIndex: 4
    set:
      kueuePopulator.image.repository: myrepo/myimage
      kueuePopulator.image.tag: v1.2.3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: myrepo/myimage:v1.2.3

  - it: should apply security context
    documentIndex: 4
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: should configure ConfigMap with Kueue namespace selector
    documentIndex: 3
    set:
      kueuePopulator.config.localQueue.name: "my-local-queue"
      kueue.managerConfig.controllerManagerConfigYaml: |
        apiVersion: config.kueue.x-k8s.io/v1beta2
        kind: Configuration
        managedJobsNamespaceSelector:
          matchLabels:
            team: ml
    asserts:
      - matchRegex:
          path: data["controller_manager_config.yaml"]
          pattern: "localQueueName: my-local-queue"
      - matchRegex:
          path: data["controller_manager_config.yaml"]
          pattern: |
            managedJobsNamespaceSelector:
            \s+matchLabels:
            \s+team: ml
      - notExists:
          path: data["kueue_controller_manager_config.yaml"]

  - it: should let explicit populator namespace selector override Kueue selector
    documentIndex: 3
    set:
      kueuePopulator.config.managedJobsNamespaceSelector:
        matchLabels:
          app: my-app
      kueue.managerConfig.controllerManagerConfigYaml: |
        apiVersion: config.kueue.x-k8s.io/v1beta2
        kind: Configuration
        managedJobsNamespaceSelector:
          matchLabels:
            team: ml
    asserts:
      - matchRegex:
          path: data["controller_manager_config.yaml"]
          pattern: |
            managedJobsNamespaceSelector:
            \s+matchLabels:
            \s+app: my-app
      - notMatchRegex:
          path: data["controller_manager_config.yaml"]
          pattern: "team: ml"

  - it: should default ConfigMap namespace selector from release namespace
    documentIndex: 3
    release:
      namespace: custom-kueue-system
    set:
      kueue.managerConfig.controllerManagerConfigYaml: |
        apiVersion: config.kueue.x-k8s.io/v1beta2
        kind: Configuration
    asserts:
      - matchRegex:
          path: data["controller_manager_config.yaml"]
          pattern: |
            managedJobsNamespaceSelector:
            \s+matchExpressions:
            \s+- key: kubernetes.io/metadata.name
            \s+operator: NotIn
            \s+values:
            \s+- kube-system
            \s+- custom-kueue-system

  - it: should preserve explicit empty Kueue namespace selector
    documentIndex: 3
    set:
      kueue.managerConfig.controllerManagerConfigYaml: |
        apiVersion: config.kueue.x-k8s.io/v1beta2
        kind: Configuration
        managedJobsNamespaceSelector: {}
    asserts:
      - matchRegex:
          path: data["controller_manager_config.yaml"]
          pattern: |
            managedJobsNamespaceSelector:\s+{}
      - notMatchRegex:
          path: data["controller_manager_config.yaml"]
          pattern: "kube-system"

  - it: should default null Kueue namespace selector from release namespace
    documentIndex: 3
    release:
      namespace: custom-kueue-system
    set:
      kueue.managerConfig.controllerManagerConfigYaml: |
        apiVersion: config.kueue.x-k8s.io/v1beta2
        kind: Configuration
        managedJobsNamespaceSelector: null
    asserts:
      - matchRegex:
          path: data["controller_manager_config.yaml"]
          pattern: |
            managedJobsNamespaceSelector:
            \s+matchExpressions:
            \s+- key: kubernetes.io/metadata.name
            \s+operator: NotIn
            \s+values:
            \s+- kube-system
            \s+- custom-kueue-system
      - notMatchRegex:
          path: data["controller_manager_config.yaml"]
          pattern: |
            managedJobsNamespaceSelector:\s+null

  - it: should set imagePullSecrets
    documentIndex: 4
    set:
      kueuePopulator.imagePullSecrets:
        - name: my-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-secret

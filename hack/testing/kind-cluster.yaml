kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiVersion: kubeadm.k8s.io/v1beta4
    scheduler:
      extraArgs:
      - name: v
        value: "3"
    controllerManager:
      extraArgs:
      - name: v
        value: "3"
    apiServer:
      extraArgs:
      - name: enable-aggregator-routing
        value: "true"
      - name: v
        value: "6"
      # DEBUG (#12024): http2debug=1 logs the webhook client's connection
      # lifecycle (new conn / reuse / GOAWAY / close) so we can prove whether the
      # failing call rode a stale pooled connection. Revert before merge.
      extraEnvs:
      - name: GODEBUG
        value: "http2debug=1"
  - |
    kind: InitConfiguration
    apiVersion: kubeadm.k8s.io/v1beta4
    nodeRegistration:
      kubeletExtraArgs:
      - name: v
        value: "3"
- role: worker
  labels:
    instance-type: on-demand
- role: worker
  labels:
    instance-type: spot

kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    apiVersion: kubeadm.k8s.io/v1beta4
    nodeRegistration:
      kubeletExtraArgs:
      - name: v
        value: "3"

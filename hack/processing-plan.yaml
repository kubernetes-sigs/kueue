        indentation: 2
      - type: "APPEND"
        key: ".metadata.name"
        value: '"{{ include \"kueue.fullname\" . }}-"'
      - type: "INSERT_TEXT"
        key: ".metadata.name"
        value: |
          {{- if .Values.enableCertManager }}
          annotations:
            cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "kueue.fullname" . }}-serving-cert
          {{- end }}
          namespace: '{{ .Release.Namespace }}'
      - type: "APPEND"
        key: ".webhooks.[].clientConfig.service.name"
        value: '"{{ include \"kueue.fullname\" . }}-"'
      - type: "UPDATE"
        key: ".webhooks.[].clientConfig.service.namespace"
        value: '"{{ .Release.Namespace }}"'
      - type: "DELETE"
        key: ".webhooks.[1].failurePolicy"
      - type: "INSERT_TEXT"
        key: ".webhooks.[1].name"
        value: |
          {{- if has "pod" $integrationsConfig.frameworks }}
          failurePolicy: Fail
          {{- else }}
          failurePolicy: Ignore
          {{- end }}
          namespaceSelector:
            {{- if (hasKey $managerConfig "managedJobsNamespaceSelector") -}}
              {{- toYaml $managerConfig.managedJobsNamespaceSelector | nindent 6 -}}
            {{- else }}
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: NotIn
                values:
                  - kube-system
                  - '{{ .Release.Namespace }}'
            {{- end }}
      - type: "DELETE"
        key: ".webhooks.[2].failurePolicy"
      - type: "INSERT_TEXT"
        key: ".webhooks.[2].name"
        value: |
          {{- if has "deployment" $integrationsConfig.frameworks }}
          failurePolicy: Fail
          {{- else }}
          failurePolicy: Ignore
          {{- end }}
          namespaceSelector:
            {{- if (hasKey $managerConfig "managedJobsNamespaceSelector") -}}
              {{- toYaml $managerConfig.managedJobsNamespaceSelector | nindent 6 -}}
            {{- else }}
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: NotIn
                values:
                  - kube-system
                  - '{{ .Release.Namespace }}'
            {{- end }}
      - type: "DELETE"
        key: ".webhooks.[13].failurePolicy"
      - type: "INSERT_TEXT"
        key: ".webhooks.[13].name"
        value: |
          {{- if has "statefulset" $integrationsConfig.frameworks }}
          failurePolicy: Fail
          {{- else }}
          failurePolicy: Ignore
          {{- end }}
          namespaceSelector:
            {{- if (hasKey $managerConfig "managedJobsNamespaceSelector") -}}
              {{- toYaml $managerConfig.managedJobsNamespaceSelector | nindent 6 -}}
            {{- else }}
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: NotIn
                values:
                  - kube-system
                  - '{{ .Release.Namespace }}'
            {{- end }}

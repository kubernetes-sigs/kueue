name: ChatOps Create Release PR

on:
  issue_comment:
    types: [created]

jobs:
  create-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    # Only evaluate comments that match the slash command format exactly
    if: ${{ startsWith(github.event.comment.body, '/create-release-pr ') }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Actor Authorization
        run: |
          ACTOR="${{ github.actor }}"
          TEAM_FILE="release-team/release-team.json"
          if [ ! -f "$TEAM_FILE" ]; then
            echo "Error: Allowed actors list file $TEAM_FILE not found."
            exit 1
          fi
          if ! jq -e --arg actor "$ACTOR" '. | index($actor)' "$TEAM_FILE" > /dev/null; then
            echo "Error: Actor $ACTOR is not authorized."
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REMOTE: origin
          FORK_REMOTE: origin
        run: |
          BODY="${{ github.event.comment.body }}"
          if [[ "$BODY" =~ ^/create-release-pr\ (v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            
            # Configure git identity
            git config --global user.name "kueue-release-bot"
            git config --global user.email "kueue-release-bot@kubernetes.io"
            
            # Retrieve the GITHUB_USER from the repository owner using gh CLI
            export GITHUB_USER=$(gh repo view --json owner -q .owner.login)
            
            yes y | ./hack/releasing/prepare_pull.sh "$VERSION"
          else
            echo "Error: Invalid version format. Must be vX.Y.Z"
            exit 1
          fi

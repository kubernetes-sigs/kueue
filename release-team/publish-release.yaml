name: ChatOps Publish Release

on:
  issue_comment:
    types: [created]

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    # Only evaluate comments that match the slash command format exactly
    if: ${{ startsWith(github.event.comment.body, '/publish-release ') }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Actor Authorization
        run: |
          ACTOR="${{ github.actor }}"
          TEAM_FILE="release-team/release-team.json"
          if [ ! -f "$TEAM_FILE" ]; then
            echo "Error: Allowed actors list file $TEAM_FILE not found."
            exit 1
          fi
          if ! jq -e --arg actor "$ACTOR" '. | index($actor)' "$TEAM_FILE" > /dev/null; then
            echo "Error: Actor $ACTOR is not authorized."
            exit 1
          fi

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="${{ github.event.comment.body }}"
          if [[ "$BODY" =~ ^/publish-release\ (v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            gh release edit "$VERSION" --draft=false
          else
            echo "Error: Invalid version format. Must be vX.Y.Z"
            exit 1
          fi

# See https://cloud.google.com/cloud-build/docs/build-config
timeout: 3000s
# A build step specifies an action that you want cloudbuild to perform.
# For each build step, cloudbuild executes a docker container.
steps:
  # see https://github.com/kubernetes/test-infra/tree/master/config/jobs/image-pushing
  - name: 'gcr.io/k8s-staging-test-infra/gcb-docker-gcloud:v20260127-c1affcc8de'
    entrypoint: make
    args:
      - image-pushing-postsubmit
    env:
      - DOCKER_BUILDX_CMD=/buildx-entrypoint
      - GOTOOLCHAIN=auto

  - name: 'gcr.io/projectsigstore/cosign:v2.4.1'
    id: 'attest-staging-images'
    entrypoint: 'sh'
    env:
      - 'REGISTRY=us-central1-docker.pkg.dev/k8s-staging-images/kueue'
    args:
      - '-c'
      - |
        echo "Generating SLSA build provenance predicate..."
        cat <<EOF > slsa-predicate.json
        {
          "builder": {
            "id": "https://cloudbuild.googleapis.com/GoogleCloudBuild"
          },
          "buildType": "https://cloud.google.com/build/v1",
          "invocation": {
            "configSource": {
              "uri": "git+https://github.com/kubernetes-sigs/kueue.git",
              "entryPoint": "cloudbuild.yaml"
            },
            "parameters": {
              "commit_sha": "$COMMIT_SHA",
              "build_id": "$BUILD_ID"
            }
          },
          "metadata": {
            "buildInvocationId": "$BUILD_ID"
          },
          "materials": [
            {
              "uri": "git+https://github.com/kubernetes-sigs/kueue.git",
              "digest": {
                "sha1": "$COMMIT_SHA"
              }
            }
          ]
        }
        EOF

        # List of images built and pushed by the Makefile target to attest
        IMAGES="kueue kueueviz kueue-populator kueue-priority-booster importer"

        for img in \$IMAGES; do
          echo "Attesting \${REGISTRY}/\${img}:\${_GIT_TAG} with SLSA provenance..."
          cosign attest --yes \
            --type slsaprovenance \
            --predicate slsa-predicate.json \
            \${REGISTRY}/\${img}:\${_GIT_TAG}
        done
substitutions:
  # _GIT_TAG will be filled with a git-based tag for the image, of the form vYYYYMMDD-hash, and
  # can be used as a substitution
  _GIT_TAG: '0.0.0'
  # _PULL_BASE_REF will contain the ref that was pushed to trigger this build -
  # a branch like 'main' or 'release-0.2', or a tag like 'v0.2'.
  _PULL_BASE_REF: 'main'
options:
  substitution_option: ALLOW_LOOSE
  machineType: 'E2_HIGHCPU_32'

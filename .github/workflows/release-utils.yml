name: Kueue Release Utility Operations ChatOps Controller

on:
  issue_comment:
    types: [created]

jobs:
  sync-notes:
    name: Sync Release Notes
    runs-on: ubuntu-latest
    # Only evaluate comments that match the slash command format exactly
    if: ${{ startsWith(github.event.comment.body, '/sync-release-notes') }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Actor Authorization
        run: |
          ACTOR="${{ github.actor }}"
          TEAM_FILE="release-team.json"
          if [ ! -f "$TEAM_FILE" ]; then
            echo "Error: Allowed actors list file $TEAM_FILE not found."
            exit 1
          fi
          if ! jq -e --arg actor "$ACTOR" '. | index($actor)' "$TEAM_FILE" > /dev/null; then
            echo "Error: Actor $ACTOR is not authorized."
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install release-notes tool
        run: |
          go install k8s.io/release/cmd/release-notes@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run Sync Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REMOTE: origin
        run: |
          BODY="${{ github.event.comment.body }}"
          if [[ "$BODY" =~ ^/sync-release-notes[[:space:]]*$ ]]; then
            TITLE="${{ github.event.issue.title }}"
            if [[ "$TITLE" =~ ^Release\ (v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              VERSION="${BASH_REMATCH[1]}"
              
              # Configure git identity
              git config --global user.name "kueue-release-bot"
              git config --global user.email "kueue-release-bot@kubernetes.io"
              
              yes y | ./hack/releasing/sync-notes.sh "$VERSION"
            else
              echo "Error: Issue title '$TITLE' does not match 'Release vX.Y.Z'"
              exit 1
            fi
          else
            echo "Error: Invalid command format. Use /sync-release-notes without arguments."
            exit 1
          fi

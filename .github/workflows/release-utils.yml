on:
  issue_comment:
    types: [created]

jobs:
  sync-notes:
    name: Sync Release Notes
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.event.comment.body, '/sync-release-notes') }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify Actor Authorization
        env:
          ACTOR: ${{ github.actor }}
          OWNERS_FILE: OWNERS_ALIASES
        run: |
          if [ ! -f "$OWNERS_FILE" ]; then
            echo "Error: $OWNERS_FILE not found."
            exit 1
          fi
          if ! python3 -c "
          import os, yaml

          aliases = yaml.safe_load(open(os.environ['OWNERS_FILE'])).get('aliases', {})
          authorized = set(aliases.get('release-team', [])) | set(aliases.get('kueue-approvers', []))
          raise SystemExit(0 if os.environ['ACTOR'] in authorized else 1)
          "; then
            echo "Error: Actor $ACTOR is not authorized."
            exit 1
          fi

      - name: Validate Command and Issue Title
        id: validate
        env:
          BODY: ${{ github.event.comment.body }}
          TITLE: ${{ github.event.issue.title }}
        run: |
          if [[ ! "$BODY" =~ ^/sync-release-notes[[:space:]]*$ ]]; then
            echo "Error: Invalid command format. Use /sync-release-notes without arguments."
            exit 1
          fi

          if [[ ! "$TITLE" =~ ^Release\ (v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Error: Issue title '$TITLE' does not match 'Release vX.Y.Z'"
            exit 1
          fi

          VERSION="${BASH_REMATCH[1]}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'

      - name: Install release-notes tool
        run: |
          go install k8s.io/release/cmd/release-notes@v0.20.1
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run Sync Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REMOTE: origin
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          # Configure git identity
          git config --global user.name "kueue-release-bot"
          git config --global user.email "kueue-release-bot@kubernetes.io"
          
          yes y | ./hack/releasing/sync-notes.sh "$VERSION"

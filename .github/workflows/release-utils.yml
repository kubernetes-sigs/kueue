on:
  issue_comment:
    types: [created]

concurrency:
  group: release-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  authorize:
    name: Authorize and Parse Command
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.issue.pull_request == null &&
      (contains(github.event.comment.body, '/sync-release-notes') ||
       contains(github.event.comment.body, '/create-release-branch') ||
       contains(github.event.comment.body, '/tag-release') ||
       contains(github.event.comment.body, '/create-draft-release') ||
       contains(github.event.comment.body, '/wait-for-images') ||
       contains(github.event.comment.body, '/wait-for-prod-images') ||
       contains(github.event.comment.body, '/prepare-pull') ||
       contains(github.event.comment.body, '/publish-release'))
    outputs:
      command: ${{ steps.parse.outputs.command }}
      version: ${{ steps.parse.outputs.version }}
      branch: ${{ steps.parse.outputs.branch }}
      changelog: ${{ steps.parse.outputs.changelog }}
      target: ${{ steps.parse.outputs.target }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Verify Actor Authorization
        env:
          ACTOR: ${{ github.actor }}
          OWNERS_FILE: OWNERS_ALIASES
        run: |
          if [ ! -f "$OWNERS_FILE" ]; then
            echo "Error: $OWNERS_FILE not found."
            exit 1
          fi
          if ! python3 -c "
          import os, yaml

          aliases = yaml.safe_load(open(os.environ['OWNERS_FILE'])).get('aliases', {})
          authorized = set(aliases.get('release-team', [])) | set(aliases.get('kueue-approvers', []))
          raise SystemExit(0 if os.environ['ACTOR'] in authorized else 1)
          "; then
            echo "Error: Actor $ACTOR is not authorized."
            exit 1
          fi

      - name: Parse and Validate Command and Version
        id: parse
        env:
          BODY: ${{ github.event.comment.body }}
          TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if [[ ! "$TITLE" =~ ^Release\ (v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "error_message=❌ Invalid issue title: \`$TITLE\`. Expected format: \`Release vX.Y.Z\`." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          VERSION="${BASH_REMATCH[1]}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" =~ ^v([0-9]+)\.([0-9]+)\.[0-9]+ ]]; then
            echo "branch=release-${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          fi

          COMMAND=""
          if printf '%s' "$BODY" | tr -d '\r' | grep -qE '^/sync-release-notes[[:space:]]*$'; then
            COMMAND="sync-notes"
          elif printf '%s' "$BODY" | tr -d '\r' | grep -qE '^/create-release-branch[[:space:]]*$'; then
            COMMAND="create-release-branch"
          elif printf '%s' "$BODY" | tr -d '\r' | grep -qE '^/tag-release[[:space:]]*$'; then
            COMMAND="tag-release"
          elif printf '%s' "$BODY" | tr -d '\r' | grep -qE '^/create-draft-release[[:space:]]*$'; then
            COMMAND="create-draft-release"
          elif printf '%s' "$BODY" | tr -d '\r' | grep -qE '^/wait-for-images[[:space:]]*$'; then
            COMMAND="wait-for-images"
          elif printf '%s' "$BODY" | tr -d '\r' | grep -qE '^/wait-for-prod-images[[:space:]]*$'; then
            COMMAND="wait-for-prod-images"
          elif printf '%s' "$BODY" | tr -d '\r' | grep -qE '^/prepare-pull([[:space:]]+(release|main))?[[:space:]]*$'; then
            COMMAND="prepare-pull"
            TARGET=$(printf '%s' "$BODY" | tr -d '\r' | grep -oE '^/prepare-pull([[:space:]]+(release|main))?[[:space:]]*$' | head -n 1 | awk '{print $2}')
            if [ -z "$TARGET" ]; then
              echo "error_message=❌ Invalid command: \`/prepare-pull\` requires a parameter: \`release\` or \`main\`." >> "$GITHUB_OUTPUT"
              exit 1
            fi
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$BODY" | tr -d '\r' | grep -qE '^/publish-release[[:space:]]*$'; then
            COMMAND="publish-release"
          else
            echo "error_message=❌ Invalid command format." >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "command=$COMMAND" >> "$GITHUB_OUTPUT"
          
          CHANGELOG="$(echo "$ISSUE_BODY" | sed -n '/^```markdown$/,/^```$/p' | sed '/^```markdown$/d;/^```$/d')"
          EOF_DELIM="$(openssl rand -hex 16)"
          {
            echo "changelog<<${EOF_DELIM}"
            printf '%s\n' "$CHANGELOG"
            echo "${EOF_DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Report Parse Failure
        if: ${{ failure() }}
        uses: ./.github/actions/report-result
        with:
          alias: "Authorization"
          message: ${{ steps.parse.outputs.error_message }}

      - name: Clear Authorization Log
        if: ${{ success() }}
        uses: ./.github/actions/report-result
        with:
          alias: "Authorization"
          cleanup: true

  sync-notes:
    name: Sync Release Notes
    runs-on: ubuntu-latest
    needs: authorize
    timeout-minutes: 30
    if: ${{ needs.authorize.outputs.command == 'sync-notes' }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: 'go.mod'

      - name: Install release-notes tool
        run: |
          go install k8s.io/release/cmd/release-notes@v0.20.1
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run Sync Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_REMOTE: origin
          VERSION: ${{ needs.authorize.outputs.version }}
        run: |
          # Configure git identity
          git config --global user.name "kueue-release-bot"
          git config --global user.email "kueue-release-bot@kubernetes.io"
          
          set +e
          yes y | ./hack/releasing/sync-notes.sh "$VERSION" 2> err.log
          EXIT_CODE=$?
          set -e
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Error running sync-notes.sh" >&2
            cat err.log >&2
            
            EOF_DELIM="$(openssl rand -hex 16)"
            echo "error_message<<${EOF_DELIM}" >> "$GITHUB_OUTPUT"
            cat err.log >> "$GITHUB_OUTPUT"
            echo "${EOF_DELIM}" >> "$GITHUB_OUTPUT"
            
            exit $EXIT_CODE
          fi

      - name: Report Success
        if: ${{ success() }}
        uses: ./.github/actions/report-result
        with:
          command: ${{ steps.parse.outputs.command }}
          message: "✅ Release notes for version ${{ needs.authorize.outputs.version }} have been synced."

      - name: Report Failure
        if: ${{ failure() }}
        uses: ./.github/actions/report-result
        with:
          command: ${{ steps.parse.outputs.command }}
          message: |
            ❌ Failed to sync release notes for version `${{ needs.authorize.outputs.version }}`.
            
            **Error log:**
            ```text
            ${{ steps.sync.outputs.error_message }}
            ```
  create-release-branch:
    name: Create Release Branch
    runs-on: ubuntu-latest
    needs: authorize
    timeout-minutes: 10
    if: ${{ needs.authorize.outputs.command == 'create-release-branch' }}
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Create and Push Release Branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          VERSION: ${{ needs.authorize.outputs.version }}
          BRANCH: ${{ needs.authorize.outputs.branch }}
        run: |
          # Block patch releases
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.([0-9]+)$ ]]; then
            PATCH="${BASH_REMATCH[1]}"
            if [ "$PATCH" != "0" ]; then
              gh issue comment "$ISSUE_NUMBER" --body "❌ Release branch creation is only supported for major and minor releases (vX.Y.0). Patch releases like \`$VERSION\` do not require a new release branch."
              exit 0
            fi
          fi

          # Configure git identity
          git config --global user.name "kueue-release-bot"
          git config --global user.email "kueue-release-bot@kubernetes.io"
          gh auth setup-git

          # Check if branch already exists
          if git ls-remote --heads origin "$BRANCH" | grep -q "refs/heads/$BRANCH"; then
            gh issue comment "$ISSUE_NUMBER" --body "✅ Release branch \`$BRANCH\` already exists."
            exit 0
          fi

          # Create and push the branch from main
          set +e
          git checkout -b "$BRANCH" 2> err.log
          BRANCH_EXIT=$?
          if [ $BRANCH_EXIT -eq 0 ]; then
            git push origin "$BRANCH" 2>> err.log
            PUSH_EXIT=$?
          fi
          set -e

          if [ $BRANCH_EXIT -ne 0 ] || [ $PUSH_EXIT -ne 0 ]; then
            ERR_MSG=$(cat err.log)
            gh issue comment "$ISSUE_NUMBER" --body "❌ Failed to create release branch \`$BRANCH\`.
          
            **Error details:**
            \`\`\`text
            ${ERR_MSG}
            \`\`\`"
            exit 1
          fi

          gh issue comment "$ISSUE_NUMBER" --body "✅ Release branch \`$BRANCH\` has been successfully created from \`main\`."

  wait-for-images:
    name: Wait for Images
    runs-on: ubuntu-latest
    needs: authorize
    timeout-minutes: 60
    if: | 
      needs.authorize.outputs.command == 'wait-for-images' ||
      needs.authorize.outputs.command == 'wait-for-prod-images'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install Crane
        uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7

      - name: Run Wait for Images Script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          VERSION: ${{ needs.authorize.outputs.version }}
          COMMAND: ${{ needs.authorize.outputs.command }}
        run: |
          # Initialize an empty array for arguments
          ARGS=()
          
          # Append --prod if the command matches the production condition,
          if [ "$COMMAND" = "wait-for-prod-images" ]; then
            ARGS+=("--prod")
          fi
          
          # Set an one hour timeout to prevent running indefinitely.
          ARGS+=("--timeout" "3600s")
          
          # Append the version to the arguments
          ARGS+=("$VERSION")
          
          # Direct output to a log file while still printing it to the console.
          set +e
          ./hack/releasing/wait_for_images.sh "${ARGS[@]}" 2>&1 | tee output.log
          SCRIPT_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          
          # Handle Failures.
          if [ $SCRIPT_EXIT_CODE -ne 0 ]; then
            # Extract the raw error line from the logs.
            ERROR_LINE=$(sed -n 's/^!!! Error: //p' output.log)

            # If an explicit script error message was found, comment and exit cleanly (0),
            if [ -n "$ERROR_LINE" ]; then
              echo "${ERROR_LINE}" >> comment.md
              gh issue comment "$ISSUE_NUMBER" --body-file comment.md
              exit 0
            fi
          
            # For any other unhandled crash, skip commenting.
            exit $SCRIPT_EXIT_CODE
          fi
          
          # Extract from the LAST "Images:" block to the end of the file.
          # Format it cleanly as a Markdown code block inside the issue comment.
          awk '/^Images:/ { out = ""; flag = 1 } flag { out = out $0 "\n" } END { printf "### Images Ready\n```text\n%s```", out }' output.log > comment.md
          
          # Post the parsed comment to the GitHub issue.
          gh issue comment "$ISSUE_NUMBER" --body-file comment.md

  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: authorize
    timeout-minutes: 10
    if: ${{ needs.authorize.outputs.command == 'tag-release' }}
    permissions:
      contents: write
      issues: write
    env:
      BRANCH: ${{ needs.authorize.outputs.branch }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      CHANGELOG: ${{ needs.authorize.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ needs.authorize.outputs.branch }}
          persist-credentials: false

      - name: Create and Push Tag
        env:
          VERSION: ${{ needs.authorize.outputs.version }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ needs.authorize.outputs.changelog }}
        run: |
          if [ -z "$CHANGELOG" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "❌ Failed to create release tag \`$VERSION\`: No changelog found in the issue description. Make sure the issue has the Markdown block under \`## Changelog\`."
            exit 1
          fi
          
          # Prepare tag message
          NOTES_FILE=$(mktemp)
          printf "%s\n\n%s\n" "$VERSION" "$CHANGELOG" > "$NOTES_FILE"

          # Configure git identity
          git config --global user.name "kueue-release-bot"
          git config --global user.email "kueue-release-bot@kubernetes.io"
          gh auth setup-git
          
          # Clear existing tag
          TAG_EXISTS=false
          if git tag -l | grep -q "^${VERSION}$" || git ls-remote --tags origin "$VERSION" | grep -q "refs/tags/${VERSION}$"; then
            TAG_EXISTS=true
            git tag -d "$VERSION" 2>/dev/null || true
            git push origin --delete "$VERSION" 2>/dev/null || true
          fi

          # Create and push the tag
          PUSH_EXIT=0
          set +e
          git tag -a "$VERSION" -F "$NOTES_FILE" 2> err.log
          TAG_EXIT=$?
          if [ $TAG_EXIT -eq 0 ]; then
            git push origin "$VERSION" 2>> err.log
            PUSH_EXIT=$?
          fi
          set -e
          rm -f "$NOTES_FILE"
          
          if [ $TAG_EXIT -ne 0 ] || [ $PUSH_EXIT -ne 0 ]; then
            ERR_MSG=$(cat err.log)
            gh issue comment "$ISSUE_NUMBER" --body "❌ Failed to create or push release tag \`$VERSION\`.
            
            **Error details:**
            \`\`\`text
            ${ERR_MSG}
            \`\`\`"
            exit 1
          fi
          
          # Log successful creation/update
          ACTION="created"
          if [ "$TAG_EXISTS" = "true" ]; then
            ACTION="updated"
          fi
          
          gh issue comment "$ISSUE_NUMBER" --body "✅ Release tag \`$VERSION\` has been successfully ${ACTION}."

  create-draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: authorize
    timeout-minutes: 30
    if: ${{ needs.authorize.outputs.command == 'create-draft-release' }}
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ needs.authorize.outputs.version }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: 'go.mod'

      - name: Build Release Artifacts
        env:
          VERSION: ${{ needs.authorize.outputs.version }}
        run: |
          make release-artifacts IMAGE_REGISTRY=registry.k8s.io/kueue GIT_TAG="$VERSION"

      - name: Create Draft Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          VERSION: ${{ needs.authorize.outputs.version }}
          TARGET_REPO: ${{ github.repository }}
          CHANGELOG: ${{ needs.authorize.outputs.changelog }}
        run: |
          ACTION="created"

          # Check if a release for this version already exists (draft or published).
          RELEASE_STATE=$(gh release list --repo "$TARGET_REPO" --exclude-drafts=false --json tagName,isDraft 2>/dev/null | \
            jq -r --arg ver "$VERSION" '.[] | select(.tagName == $ver) | if .isDraft then "draft" else "published" end')

          if [ "$RELEASE_STATE" = "published" ]; then
            BODY="⚠️ Release \`$VERSION\` is already published. Skipping draft release creation to avoid overwriting a live release."
            echo "$BODY"
            gh issue comment "$ISSUE_NUMBER" --body "$BODY"
            exit 0
          elif [ "$RELEASE_STATE" = "draft" ]; then
            echo "Draft release \`$VERSION\` already exists. Deleting it first to perform a clean update..."
            gh release delete "$VERSION" --repo "$TARGET_REPO" --yes
            ACTION="updated"
          fi

          # Create a draft release.
          set +e
          echo "Creating \`$VERSION\` release."
          gh release create "$VERSION" \
            --verify-tag \
            --repo "$TARGET_REPO" \
            --title "$VERSION" \
            --notes "$CHANGELOG" \
            --draft \
            release-artifacts/* 2> err.log
          RELEASE_EXIT=$?
          set -e

          if [ $RELEASE_EXIT -ne 0 ]; then
            ERR_MSG="$(cat err.log)"
            echo "$ERR_MSG"
            gh issue comment "$ISSUE_NUMBER" --body "❌ Failed to create draft release \`$VERSION\`.

            **Error details:**
            \`\`\`text
            ${ERR_MSG}
            \`\`\`"
            exit 1
          fi

          # Post a comment to the GitHub issue.
          BODY="✅ Draft release has been successfully ${ACTION}."
          echo "$BODY"
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"

  prepare-pull:
    name: Prepare Pull
    runs-on: ubuntu-latest
    needs: authorize
    timeout-minutes: 30
    if: ${{ needs.authorize.outputs.command == 'prepare-pull' }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: 'go.mod'

      - name: Configure Git and GH CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "kueue-release-bot"
          git config --global user.email "kueue-release-bot@kubernetes.io"
          gh auth setup-git

      - name: Run Prepare Pull
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          VERSION: ${{ needs.authorize.outputs.version }}
          TARGET: ${{ needs.authorize.outputs.target }}
          GITHUB_USER: ${{ github.repository_owner }}
          UPSTREAM_REMOTE: origin
        run: |
          set +e
          yes y | ./hack/releasing/prepare_pull.sh --target "$TARGET" "$VERSION" 2>&1 | tee /tmp/prepare-pull.log
          SCRIPT_EXIT_CODE=${PIPESTATUS[1]}
          set -e

          if [ $SCRIPT_EXIT_CODE -ne 0 ]; then
            # Extract any line starting with !!! as error details
            ERR_MSG=$(grep -E '^!!!' /tmp/prepare-pull.log || true)
            if [ -z "$ERR_MSG" ]; then
              ERR_MSG="Check workflow logs for details."
            fi
            gh issue comment "$ISSUE_NUMBER" --body "❌ Failed to prepare pull requests for version \`$VERSION\` (target: \`$TARGET\`).
            
            **Error details:**
            \`\`\`text
            ${ERR_MSG}
            \`\`\`"
            exit $SCRIPT_EXIT_CODE
          fi

          gh issue comment "$ISSUE_NUMBER" --body "✅ Successfully prepared pull request(s) for version \`$VERSION\` (target: \`$TARGET\`)."

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: authorize
    timeout-minutes: 10
    if: ${{ needs.authorize.outputs.command == 'publish-release' }}
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          VERSION: ${{ needs.authorize.outputs.version }}
          COMMAND: ${{ needs.authorize.outputs.command }}
        run: |
          # Check the current state of the release.
          RELEASE_STATE=$(gh release list --repo "$GITHUB_REPOSITORY" --exclude-drafts=false --json tagName,isDraft 2>/dev/null | \
            jq -r --arg ver "$VERSION" '.[] | select(.tagName == $ver) | if .isDraft then "draft" else "published" end')

          if [ "$RELEASE_STATE" = "published" ]; then
            BODY="⚠️ Release \`$VERSION\` is already published."
            echo "$BODY"
            gh issue comment "$ISSUE_NUMBER" --body "$BODY"
            exit 0
          elif [ -z "$RELEASE_STATE" ]; then
            BODY="❌ Release \`$VERSION\` not found. Please create a draft release first using \`/create-draft-release\`."
            echo "$BODY"
            gh issue comment "$ISSUE_NUMBER" --body "$BODY"
            exit 1
          fi

          # Publish the draft release.
          set +e
          gh release edit "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false 2> err.log
          EDIT_EXIT=$?
          set -e

          if [ $EDIT_EXIT -ne 0 ]; then
            ERR_MSG="$(cat err.log)"
            echo "$ERR_MSG"
            gh issue comment "$ISSUE_NUMBER" --body "❌ Failed to publish release \`$VERSION\`.

            **Error details:**
            \`\`\`text
            ${ERR_MSG}
            \`\`\`"
            exit 1
          fi

          # Construct the release URL and inject it into the issue body.
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${VERSION}"
          CURRENT_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q .body)
          UPDATED_BODY=$(printf '%s' "$CURRENT_BODY" | sed "s|<!-- RELEASE_LINK -->|${RELEASE_URL}|")
          if [ "$CURRENT_BODY" != "$UPDATED_BODY" ]; then
            gh issue edit "$ISSUE_NUMBER" --body "$UPDATED_BODY"
          fi

          BODY="$(cat <<EOF
          ✅ Release \`$VERSION\` has been successfully published.
          Link: ${RELEASE_URL}
          EOF
          )"
          echo "$BODY"
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"
